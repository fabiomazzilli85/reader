<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader Modal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4ef;
      --surface: #ffffff;
      --border: #d4d0c8;
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #2d6a4f;
      --accent-hover: #1e4d39;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .editor-card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .editor-toolbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot-red   { background: #ff5f57; }
    .dot-yellow{ background: #febc2e; }
    .dot-green { background: #28c840; }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 20px;
      font-family: "Georgia", serif;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text);
      background: transparent;
      border: none;
      resize: vertical;
      outline: none;
    }

    textarea::placeholder { color: var(--muted); }

    .editor-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .char-count {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .btn-open {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-open:hover { background: var(--accent-hover); }
    .btn-open:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* ── MODAL OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      width: 100%;
      max-width: 720px;
      max-height: calc(100vh - 96px);
      display: flex;
      flex-direction: column;
      background: var(--modal-bg, #fffef7);
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      transform: translateY(16px);
      transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
    }

    .overlay.open .modal { transform: translateY(0); }

    /* ── MODAL CONTROLS ── */
    .modal-controls {
      flex-shrink: 0;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .control-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      white-space: nowrap;
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stepper button {
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: background 0.1s;
    }

    .stepper button:hover { background: var(--bg); }

    .stepper span {
      font-size: 0.85rem;
      min-width: 32px;
      text-align: center;
    }

    /* theme swatches */
    .theme-swatches { display: flex; gap: 6px; }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }

    .swatch:hover { transform: scale(1.1); }
    .swatch.active { border-color: var(--accent); }
    .swatch-paper  { background: #fffef7; }
    .swatch-light  { background: #ffffff; }
    .swatch-sepia  { background: #f4ecd8; }
    .swatch-dark   { background: #1e1e1e; }

    /* font family picker */
    .font-picker {
      display: flex;
      gap: 4px;
    }

    .font-btn {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text);
      transition: background 0.1s, border-color 0.1s;
    }

    .font-btn.active { border-color: var(--accent); background: #e8f4ef; color: var(--accent); }
    .font-btn[data-font="serif"]  { font-family: Georgia, serif; }
    .font-btn[data-font="sans"]   { font-family: -apple-system, sans-serif; }
    .font-btn[data-font="mono"]   { font-family: "Courier New", monospace; }

    /* close button */
    .modal-close {
      margin-left: auto;
      width: 30px;
      height: 30px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--muted);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }

    .modal-close:hover { background: var(--bg); color: var(--text); }

    /* ── MODAL BODY ── */
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 40px 48px;
      scroll-behavior: smooth;
    }

    .modal-body::-webkit-scrollbar { width: 6px; }
    .modal-body::-webkit-scrollbar-track { background: transparent; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #reader-text {
      font-size: var(--reader-size, 18px);
      line-height: var(--reader-lh, 1.8);
      font-family: var(--reader-font, Georgia, serif);
      color: var(--reader-color, #1a1a18);
      white-space: pre-wrap;
      word-break: break-word;
      transition: font-size 0.15s, line-height 0.15s;
    }

    /* ── MODAL FOOTER / PROGRESS ── */
    .modal-footer {
      flex-shrink: 0;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s;
    }

    .progress-label {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── DARK THEME OVERRIDES ── */
    .modal.theme-dark {
      --modal-bg: #1e1e1e;
      --surface: #2a2a2a;
      --border: #3a3a3a;
      --text: #e8e6e0;
      --muted: #888;
      --bg: #1a1a1a;
      --reader-color: #e8e6e0;
    }

    .modal.theme-sepia {
      --modal-bg: #f4ecd8;
      --surface: #ede3ca;
      --border: #c9b99a;
      --reader-color: #3b2e1e;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>Reader Modal</h1>
  <p class="subtitle">Incolla o scrivi del testo, poi aprilo in modalità lettura.</p>

  <div class="editor-card">
    <div class="editor-toolbar">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
    </div>
    <textarea id="input-text" placeholder="Incolla o scrivi qui il testo che vuoi leggere…" spellcheck="false"></textarea>
    <div class="editor-footer">
      <span class="char-count" id="char-count">0 caratteri</span>
      <button class="btn-open" id="open-btn" disabled>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="1" width="14" height="14" rx="2"/>
          <line x1="4" y1="5" x2="12" y2="5"/>
          <line x1="4" y1="8" x2="12" y2="8"/>
          <line x1="4" y1="11" x2="9" y2="11"/>
        </svg>
        Apri in lettura
      </button>
    </div>
  </div>

  <!-- MODAL -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Modalità lettura">
    <div class="modal" id="modal">
      <div class="modal-controls">

        <!-- Font size -->
        <div class="control-group">
          <span class="control-label">Testo</span>
          <div class="stepper">
            <button id="size-down" title="Riduci">−</button>
            <span id="size-val">18</span>
            <button id="size-up" title="Aumenta">+</button>
          </div>
        </div>

        <!-- Line height -->
        <div class="control-group">
          <span class="control-label">Interlinea</span>
          <div class="stepper">
            <button id="lh-down" title="Riduci">−</button>
            <span id="lh-val">1.8</span>
            <button id="lh-up" title="Aumenta">+</button>
          </div>
        </div>

        <!-- Font family -->
        <div class="control-group">
          <span class="control-label">Font</span>
          <div class="font-picker">
            <button class="font-btn active" data-font="serif">Serif</button>
            <button class="font-btn" data-font="sans">Sans</button>
            <button class="font-btn" data-font="mono">Mono</button>
          </div>
        </div>

        <!-- Theme -->
        <div class="control-group">
          <span class="control-label">Tema</span>
          <div class="theme-swatches">
            <span class="swatch swatch-paper active" data-theme="paper" title="Paper"></span>
            <span class="swatch swatch-light" data-theme="light" title="Chiaro"></span>
            <span class="swatch swatch-sepia" data-theme="sepia" title="Seppia"></span>
            <span class="swatch swatch-dark"  data-theme="dark"  title="Scuro"></span>
          </div>
        </div>

        <button class="modal-close" id="close-btn" title="Chiudi (Esc)">✕</button>
      </div>

      <div class="modal-body" id="modal-body">
        <div id="reader-text"></div>
      </div>

      <div class="modal-footer">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-label" id="progress-label">0%</span>
      </div>
    </div>
  </div>

  <script>
    const textarea   = document.getElementById('input-text');
    const charCount  = document.getElementById('char-count');
    const openBtn    = document.getElementById('open-btn');
    const overlay    = document.getElementById('overlay');
    const modal      = document.getElementById('modal');
    const closeBtn   = document.getElementById('close-btn');
    const readerText = document.getElementById('reader-text');
    const modalBody  = document.getElementById('modal-body');
    const progressFill  = document.getElementById('progress-fill');
    const progressLabel = document.getElementById('progress-label');

    // ── state
    let fontSize   = 18;
    let lineHeight = 1.8;

    const fonts = {
      serif: 'Georgia, "Times New Roman", serif',
      sans:  '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
      mono:  '"Courier New", Courier, monospace',
    };

    // ── char count & enable button
    textarea.addEventListener('input', () => {
      const n = textarea.value.length;
      charCount.textContent = n.toLocaleString('it-IT') + ' caratteri';
      openBtn.disabled = n === 0;
    });

    // ── open modal
    openBtn.addEventListener('click', openModal);

    function openModal() {
      const raw = textarea.value.trim();
      if (!raw) return;
      readerText.textContent = raw;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      modalBody.scrollTop = 0;
      updateProgress();
    }

    // ── close modal
    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeModal);

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
    });

    // ── font size stepper
    document.getElementById('size-down').addEventListener('click', () => {
      if (fontSize <= 12) return;
      fontSize -= 1;
      applySize();
    });

    document.getElementById('size-up').addEventListener('click', () => {
      if (fontSize >= 36) return;
      fontSize += 1;
      applySize();
    });

    function applySize() {
      readerText.style.fontSize = fontSize + 'px';
      document.getElementById('size-val').textContent = fontSize;
    }

    // ── line height stepper
    document.getElementById('lh-down').addEventListener('click', () => {
      if (lineHeight <= 1.2) return;
      lineHeight = Math.round((lineHeight - 0.1) * 10) / 10;
      applyLH();
    });

    document.getElementById('lh-up').addEventListener('click', () => {
      if (lineHeight >= 3.0) return;
      lineHeight = Math.round((lineHeight + 0.1) * 10) / 10;
      applyLH();
    });

    function applyLH() {
      readerText.style.lineHeight = lineHeight;
      document.getElementById('lh-val').textContent = lineHeight.toFixed(1);
    }

    // ── font family buttons
    document.querySelectorAll('.font-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        readerText.style.fontFamily = fonts[btn.dataset.font];
      });
    });

    // ── theme swatches
    const themeClasses = ['theme-paper', 'theme-light', 'theme-sepia', 'theme-dark'];

    document.querySelectorAll('.swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        modal.classList.remove(...themeClasses);
        modal.classList.add('theme-' + swatch.dataset.theme);
      });
    });

    // ── reading progress
    modalBody.addEventListener('scroll', updateProgress);

    function updateProgress() {
      const { scrollTop, scrollHeight, clientHeight } = modalBody;
      const max = scrollHeight - clientHeight;
      const pct = max > 0 ? Math.round((scrollTop / max) * 100) : 0;
      progressFill.style.width = pct + '%';
      progressLabel.textContent = pct + '%';
    }
  </script>
</body>
</html>
